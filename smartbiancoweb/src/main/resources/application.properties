spring.application.name=smartbiancoweb
server.port=8081
# 1. URL do Banco
spring.datasource.url=jdbc:mysql://localhost:3306/BDSmartBianco?createDatabaseIfNotExist=true
# 2. Usuário do seu MySQL (geralmente é root)
spring.datasource.username=root
# 3. Senha que você colocou no MySQL Workbench
spring.datasource.password=Medi2247@

# Configurações do Hibernate/JPA
# 'update' faz o Java criar ou alterar as tabelas no MySQL automaticamente baseado nas suas classes
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do VS Code cada comando SQL que o Java executar
spring.jpa.show-sql=true

# Ajuste para a versão moderna do MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect